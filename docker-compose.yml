services:
  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest@sha256:62d2b9d20a19714ebfe48d1bb405086081bc602aa053e28cf6d73c7537640dfb
    pull_policy: always
    ports:
      - 3000:3000 # UI
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - tempo
      - loki
      - mimir

  # Tempo for trace visualization
  tempo:
    image: grafana/tempo:latest@sha256:8fb75ab1cf8c2b1798dbdbe5095871a8e51af498bce7314420287bd4ec2a1715
    pull_policy: always
    command:
      - -config.file=/etc/tempo/tempo.yaml
      - -target=all
    ports:
      - 3200:3200 # UI
    volumes:
      - ./tempo/:/etc/tempo/

  # Loki for log aggregation
  loki:
    image: grafana/loki:latest@sha256:5fe9fa99e9a747297cdf0239a5b25d192d8f668bd6505b09beef4dffcab5aac2
    pull_policy: always
    command:
      - -config.file=/etc/loki/loki.yaml
      - -target=all
    ports:
      - 3100:3100
    volumes:
      - ./loki/:/etc/loki/

  # Mimir for metrics (replacing Prometheus)
  mimir:
    image: grafana/mimir:latest@sha256:3e2a4293faa9ef6b7a291fc6eb64841b8c2eb0479c192716b9ca6420b5a34393
    pull_policy: always
    command:
      - -config.file=/etc/mimir/mimir.yaml
      - -target=all
    ports:
      - 9009:9009 # HTTP
    volumes:
      - ./mimir/:/etc/mimir/

  # Grafana Alloy for telemetry collection (replacing OpenTelemetry Collector)
  alloy:
    image: grafana/alloy:latest@sha256:7790f6f7fbd8e4486b4b6c6fc6a7293a73605bb79aaa7f49003cb366943724f6
    pull_policy: always
    command:
     - run
     - /etc/alloy/config.alloy
     - --storage.path=/tmp/alloy/data
     - --server.http.listen-addr=0.0.0.0:8080
     - --stability.level=experimental
    ports:
      - 4317:4317 # OTLP gRPC
      - 4318:4318 # OTLP HTTP
      - 8080:8080 # UI
    volumes:
      - ./alloy/:/etc/alloy/
    depends_on:
      - tempo
      - loki
      - mimir
